<div class="row g-2 mb-4">
    <div class="col-12">
        <div class="idx-card border-info">
            <div class="row text-center">
                <div class="col-6 border-end border-secondary">
                    <div class="small text-secondary">市場環境</div>
                    <div class="h5 mb-0 fw-bold text-info">{{ sentiment }}</div>
                </div>
                <div class="col-6">
                    <div class="small text-secondary">建議戰術</div>
                    <div class="h5 mb-0 fw-bold text-warning">{{ strategy }}</div>
                </div>
            </div>
        </div>
    </div>
</div>

{% for rec in recs %}
<div class="stk-card">
    <div class="d-flex justify-content-between align-items-start">
        <div>
            <span class="badge bg-secondary mb-1">{{ rec.type }}</span>
            <div class="h6 fw-bold">{{ rec.name }} <small class="text-muted">{{ rec.symbol }}</small></div>
            <div class="text-warning small">AI 相似度 {{ rec.score }}%</div>
        </div>
        <div class="text-end">
            <a href="/add/{{ rec.symbol }}/{{ rec.name }}" class="btn btn-add btn-sm">加入回測</a>
        </div>
    </div>
</div>
{% endfor %}
