<td>
    <a href="/add_track/{{ rec.symbol }}" class="btn btn-sm btn-outline-danger">+ 加入追蹤</a>
</td>

<div class="card mt-4">
    <div class="card-header" style="color: #00ff88; border-bottom-color: #00ff88;">💰 實戰損益追蹤 (模擬持股)</div>
    <div class="card-body">
        <table class="table">
            <thead>
                <tr>
                    <th>名稱</th>
                    <th>買入價格</th>
                    <th>現價</th>
                    <th>累計損益</th>
                    <th>加入日期</th>
                </tr>
            </thead>
            <tbody>
                {% for item in tracked_results %}
                <tr>
                    <td>{{ item.name }} ({{ item.symbol }})</td>
                    <td>{{ item.buy_price }}</td>
                    <td>{{ item.current_price }}</td>
                    <td style="color: {{ '#ff4d4d' if item.profit > 0 else '#00ff88' }}">
                        {{ '+' if item.profit > 0 }}{{ item.profit }}%
                    </td>
                    <td>{{ item.date }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
