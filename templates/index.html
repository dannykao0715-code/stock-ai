<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全市場監測決策系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; }
        .header-box { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 15px; padding: 20px; border: 1px solid #334155; }
        .stk-card { background: #161b2c; border: 1px solid #2d3748; border-radius: 12px; margin-bottom: 10px; padding: 15px; }
        .type-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; background: rgba(56, 189, 248, 0.2); color: #38bdf8; }
        .profit-pos { color: #fb7185; } .profit-neg { color: #34d399; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="header-box mb-4">
        <h4 class="fw-bold text-info"> AI 全市場海選系統</h4>
        <div class="d-flex justify-content-between">
            <span>市場總經位階：<strong>{{ sentiment }}</strong></span>
            <span class="text-muted small">日期：{{ now }}</span>
        </div>
    </div>

    <h6 class="text-secondary border-start border-info ps-2 mb-3">🔍 全市場慣性掃描結果 (由 AI 大數據比對)</h6>
    {% for rec in recs %}
    <div class="stk-card d-flex justify-content-between align-items-center">
        <div>
            <span class="type-badge">{{ rec.type }}</span>
            <div class="fw-bold mt-1 text-white">{{ rec.symbol }}</div>
            <div class="small text-warning">歷史相似度：{{ rec.score }}%</div>
        </div>
        <div class="text-end">
            <div class="small">現價: {{ rec.price }}</div>
            <a href="/add/{{ rec.symbol }}/海選" class="btn btn-sm btn-danger mt-2">追蹤回測</a>
        </div>
    </div>
    {% endfor %}

    </div>
</body>
</html>
