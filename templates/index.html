{% if recs %}
<div class="container mt-4">
    <h3 class="text-success">短線 + 波段選股</h3>
    <div class="row">
        {% for r in recs %}
        <div class="col-md-4 mb-3">
            <div class="card bg-dark text-white p-3">

                <h5>{{ r.name }}</h5>
                <small>{{ r.symbol }}</small>

                <h3>${{ r.price }}</h3>
                <div>漲幅: +{{ r.change }}%</div>

                <div>
                    {% for s in r.signals %}
                        <span class="badge bg-success">{{ s }}</span>
                    {% endfor %}
                </div>

                {% if r.winrate %}
                <div class="mt-2">
                    🎯 勝率: {{ r.winrate }}%
                </div>
                {% endif %}

            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
