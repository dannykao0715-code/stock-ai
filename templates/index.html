{% if recs %}
<div class="card-main border-success">
    <h5 class="text-success fw-bold mb-3">🔍 AI 短線 + 波段選股</h5>
    <div class="row">
        {% for r in recs %}
        <div class="col-md-4 mb-3">
            <div class="p-3 border border-secondary rounded bg-dark shadow-sm">

                <div class="d-flex justify-content-between">
                    <span class="fw-bold">{{ r.name }}</span>
                    <span class="text-secondary small">{{ r.symbol }}</span>
                </div>

                <div class="h3 my-2">${{ r.price }}</div>

                <div class="text-danger small mb-1">
                    5日漲幅: +{{ r.change }}%
                </div>

                <div class="small mb-2">
                    {% for s in r.signals %}
                        <span class="badge bg-success me-1">{{ s }}</span>
                    {% endfor %}
                </div>

                <a href="/track/{{ r.symbol }}/{{ r.name }}/{{ r.price }}"
                   class="btn btn-sm btn-outline-danger w-100">
                   加入模擬交易
                </a>

            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
