<div class="stock-card shadow-sm border-start {{ 'border-danger' if rec.score >= 88 else 'border-info' }}">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <div class="h6 fw-bold mb-1">{{ rec.name }} <span class="small text-muted">{{ rec.symbol }}</span></div>
            <div>
                <span class="badge {{ 'bg-danger' if rec.score >= 88 else 'bg-primary' }} opacity-75">
                    {{ '強慣性' if rec.score >= 88 else '潛力轉折' }}
                </span>
                <span class="ms-2 text-warning fw-bold">{{ rec.score }}%</span>
            </div>
        </div>
        <div class="text-end">
            <div class="text-advice mb-2">{{ rec.advice }}</div>
            <a href="/add/{{ rec.symbol }}/{{ rec.name }}" class="btn btn-sm btn-outline-danger">追蹤</a>
        </div>
    </div>
</div>
