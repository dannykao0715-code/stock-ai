<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 短線 + 波段選股</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#0d1117;color:#c9d1d9;">

<div class="container py-4">

    <h2 class="text-info mb-4">📊 AI 短線 + 波段選股系統</h2>

    <a href="/?scan=true" class="btn btn-success mb-4">🚀 開始掃描</a>

    {% if recs %}
    <div class="row">

        {% for r in recs %}
        <div class="col-md-4 mb-3">

            <div class="card bg-dark text-white p-3 shadow">

                <h5>{{ r.name }}</h5>
                <small>{{ r.symbol }}</small>

                <h3 class="mt-2">${{ r.price }}</h3>

                <div class="text-danger">
                    漲幅: +{{ r.change }}%
                </div>

                <div class="mt-2">
                    {% for s in r.signals %}
                        <span class="badge bg-success me-1">{{ s }}</span>
                    {% endfor %}
                </div>

                {% if r.winrate %}
                <div class="mt-2">
                    🎯 勝率: {{ r.winrate }}%
                </div>
                {% endif %}

            </div>

        </div>
        {% endfor %}

    </div>
    {% endif %}

</div>

</body>
</html>
