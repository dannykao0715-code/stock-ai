<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AI 股市監測站</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .index-val { font-size: 24px; color: #ff4d4d; }
    </style>
</head>
<body>
    <h1>我的 AI 股市監測網站</h1>
    
    <div class="card">
        <h3>1. 即時時間</h3>
        <p>{{ current_time }}</p>
    </div>

    <div class="card">
        <h3>2. 指數監測</h3>
        <p>加權指數：<span class="index-val">{{ tw_idx }}</span></p>
        <p>櫃買指數：<span class="index-val">{{ otc_idx }}</span></p>
    </div>

    <div class="card">
        <h3>3. 選股推薦 (開發中...)</h3>
        <p>AI 正在學習您的選股邏輯...</p>
    </div>
</body>
</html>
