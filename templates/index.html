<table class="table table-dark table-hover">
    <thead>
        <tr>
            <th>個股名稱</th>
            <th>相似度</th>
            <th>法人動向</th>
            <th>散戶(50張下)</th>
            <th>AI 建議</th>
            <th>操作</th>
        </tr>
    </thead>
    <tbody>
        {% for rec in recommendations %}
        <tr>
            <td><strong>{{ rec.name }}</strong><br><small class="text-muted">{{ rec.symbol }}</small></td>
            <td class="text-warning">{{ rec.score }}%</td>
            <td><span class="badge bg-primary">{{ rec.inst_buy }}</span></td>
            <td><span class="badge bg-info text-dark">{{ rec.retail }}</span></td>
            <td>{{ rec.advice }}</td>
            <td>
                <a href="/add_track/{{ rec.symbol }}/{{ rec.name }}" class="btn btn-sm btn-danger">➕ 追蹤</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
